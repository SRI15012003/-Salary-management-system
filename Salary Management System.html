<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Salary Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Salary Management System</h1>

    <!-- Add Employee Form -->
    <div class="card">
      <h2>Add Employee</h2>
      <input type="text" id="name" placeholder="Name">
      <input type="email" id="email" placeholder="Email">
      <input type="text" id="department" placeholder="Department">
      <input type="number" id="salary" placeholder="Basic Salary">
      <button onclick="addEmployee()">Add Employee</button>
    </div>

    <!-- Employee List -->
    <div class="card">
      <h2>Employee List</h2>
      <button onclick="getEmployees()">Load Employees</button>
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Salary</th>
          </tr>
        </thead>
        <tbody id="employeeTable"></tbody>
      </table>
    </div>
  </div>

<script>
function addEmployee() {
  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    department: document.getElementById("department").value,
    basic_salary: document.getElementById("salary").value
  };

  fetch("http://localhost:5000/addEmployee", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    getEmployees();
  });
}

function getEmployees() {
  fetch("http://localhost:5000/employees")
  .then(res => res.json())
  .then(data => {
    let rows = "";
    data.forEach(emp => {
      rows += `
        <tr>
          <td>${emp.name}</td>
          <td>${emp.email}</td>
          <td>${emp.department}</td>
          <td>${emp.basic_salary}</td>
        </tr>
      `;
    });
    document.getElementById("employeeTable").innerHTML = rows;
  });
}
</script>

</body>
</html>
